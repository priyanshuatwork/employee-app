name: Build and Deploy CAP App to Cloud Foundry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1. Checkout Code
      # -------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------------
      # 2. Setup Node
      # -------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------------
      # 3. Install Dependencies
      # -------------------------------
      - name: Install project dependencies
        run: npm ci

      # -------------------------------
      # 4. Install CAP + MTA tools
      # -------------------------------
      - name: Install CAP build tools
        run: npm install -g @sap/cds-dk mbt

      # -------------------------------
      # 5. Build CAP Project
      # -------------------------------
      - name: Build CAP project for production
        run: npx cds build --production

      # -------------------------------
      # 6. Build MTA Archive
      # -------------------------------
      - name: Build MTA archive
        run: mbt build

      # -------------------------------
      # 7. Install CF CLI (FIXED)
      # -------------------------------
      - name: Install Cloud Foundry CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github" -o cf.tgz
          tar -xzf cf.tgz
          chmod +x cf
          sudo mv cf /usr/local/bin/
          which cf
          cf version

      # -------------------------------
      # 8. Install MultiApps Plugin
      # -------------------------------
      - name: Install MultiApps plugin
        run: |
          cf add-plugin-repo CF-Community https://plugins.cloudfoundry.org || true
          cf install-plugin multiapps -f
          cf plugins

      # -------------------------------
      # 9. Login to Cloud Foundry
      # -------------------------------
      - name: Login to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      # -------------------------------
      # 10. Deploy MTA
      # -------------------------------
      - name: Deploy MTA to Cloud Foundry
        run: |
          cf deploy mta_archives/*.mtar -f